{% extends "base.html" %}

{% block title %}Корзина{% endblock %}

{% block content %}
  <section class="page-header">
    <h1>Корзина</h1>
    <p>Проверь товары перед оформлением заказа.</p>
  </section>

  <section class="cart-page" data-cart-page>
    <div class="cart-items" data-cart-items></div>
    <aside class="cart-summary">
      <h2>Итого</h2>
      <p>Товаров: <span data-cart-total-items>0</span></p>
      <p>Сумма: <strong><span data-cart-total-price>0.00</span> ₽</strong></p>
      <a href="{{ url_for('checkout.checkout') }}" class="checkout-link">Перейти к оформлению</a>
    </aside>
  </section>
{% endblock %}
